<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manuela Serna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #f5f1ea;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Lato', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }

    .brand {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.25rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-right: -0.4em; /* compensate trailing letter-spacing */
      opacity: 0;
      animation: fadeIn 1.6s ease-out 0.2s forwards;
    }

    .message {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(245, 241, 234, 0.55);
      margin-right: -0.5em;
      opacity: 0;
      animation: fadeIn 1.6s ease-out 1.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Mobile: show fullscreen image instead of text */
    .mobile-image {
      display: none;
    }

    @media (max-width: 767px) {
      body {
        padding: 0;
      }
      main {
        display: none;
      }
      .mobile-image {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        object-position: center;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="brand">Manuela Serna</h1>
    <p class="message">Se está construyendo algo</p>
  </main>
  <img class="mobile-image" src="image.png" alt="Manuela Serna" />
</body>
</html>
