<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manuela Serna Collection</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      /* 100dvh shrinks when mobile browser chrome appears */
      height: 100vh; /* fallback for older browsers */
      height: 100dvh;
    }

    picture {
      display: block;
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }

    img {
      display: block;
      width: 100%;
      max-height: 100vh;
      /*
      height: 100dvh;
      */
      object-fit: cover;
      object-position: center;
    }

    @media (min-width: 768px) {
      img {
       /* object-position: top left;
       */
      }
    }
  </style>
</head>
<body>
  <picture>
    <source media="(min-width: 768px)" srcset="horizontalImage.jpg" />
    <img src="image.png" alt="" />
  </picture>
</body>
</html>
