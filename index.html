<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manuela Serna — Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #f5f1ea;
      --accent: #c9a96e;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Media side (right on desktop, fullscreen on mobile) */
    .hero__media {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .hero__media picture,
    .hero__media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero__media img {
      object-fit: cover;
      object-position: center;
      animation: kenburns 18s ease-out forwards;
    }

    @keyframes kenburns {
      from { transform: scale(1.08); }
      to   { transform: scale(1);    }
    }

    /* Subtle vignette only */
    .hero__media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }

    /* Top nav */
    .nav {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 400;
    }

    .nav__brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      letter-spacing: 0.35em;
    }

    .nav__links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav__links a {
      color: var(--fg);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.25s ease;
    }

    .nav__links a:hover { opacity: 1; }

    /* Centered hero content */
    .hero__content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 1.5rem;
      animation: fadeUp 1.4s ease-out 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    .hero__title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.25rem, 4.5vw, 4.25rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
      margin-bottom: 1.5rem;
    }

    .hero__title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero__tagline {
      max-width: 38ch;
      font-size: clamp(0.9rem, 1.05vw, 1.05rem);
      font-weight: 300;
      line-height: 1.7;
      opacity: 0.8;
      margin-bottom: 2.25rem;
    }

    .cta {
      display: inline-block;
      padding: 0.9rem 2.25rem;
      border: 1px solid var(--fg);
      color: var(--fg);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .cta:hover {
      background: var(--fg);
      color: var(--bg);
    }

    /* Bottom meta strip */
    .hero__meta {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      padding: 0 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* Split layout on tablet/desktop */
    @media (min-width: 768px) {
      .hero {
        display: grid;
        grid-template-columns: minmax(360px, 5fr) 7fr;
      }

      .hero__media {
        position: relative;
        grid-column: 2;
        inset: auto;
      }

      .hero__media::after {
        background: linear-gradient(90deg, rgba(10,10,10,0.6) 0%, rgba(0,0,0,0) 18%, rgba(0,0,0,0) 100%);
      }

      .hero__panel {
        grid-column: 1;
        position: relative;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        padding: 2rem 5rem;
      }

      .hero__content {
        position: static;
        flex: 1;
        align-items: flex-start;
        justify-content: center;
        text-align: left;
        padding: 2rem 0;
        max-width: 32rem;
      }

      .hero__tagline { max-width: 32ch; }

      .nav {
        padding: 0;
      }

      .hero__meta {
        padding: 0;
        opacity: 0.5;
      }
    }

    @media (max-width: 767px) {
      .nav,
      .hero__panel,
      .hero__meta {
        display: none;
      }
      .hero__media::after {
        background: none;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__media">
      <picture>
        <source media="(min-width: 768px)" srcset="horizontalImage.jpg" />
        <img src="image.png" alt="Manuela Serna Collection" />
      </picture>
    </div>

    <aside class="hero__panel">
      <header class="nav">
        <div class="nav__brand">Manuela Serna</div>
      </header>

      <div class="hero__content">
        <span class="eyebrow">Próximamente — 2026</span>
        <h1 class="hero__title">Se está construyendo<br /> <em>algo especial</em>.</h1>
        <p class="hero__tagline">
          Una nueva colección está tomando forma. Detalle a detalle, en silencio, con intención.
        </p>
      </div>

      <div class="hero__meta">
        <span>Manuela Serna · 2026</span>
        <span>Pronto ↓</span>
      </div>
    </aside>
  </section>
</body>
</html>
