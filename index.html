<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manuela</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      /* 100dvh shrinks when mobile browser chrome appears */
      height: 100dvh;
      height: 100vh; /* fallback for older browsers */
    }

    img {
      display: block;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      object-position: center;
    }
  </style>
</head>
<body>
  <img src="image.png" alt="" />
</body>
</html>
